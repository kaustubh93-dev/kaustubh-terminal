<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaustubh | Terminal Portfolio</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css?v=3">
</head>

<body>
    <div class="crt-overlay"></div>

    <div class="app-container">
        <!-- Top Header Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <button id="theme-toggle-btn" class="footer-btn" aria-label="Toggle Theme" title="Toggle Theme">🎨</button>
                <span class="top-bar-label">Theme</span>
            </div>
            <div class="top-bar-right">
                <span id="session-timer" class="top-bar-timer">00:00:00</span>
            </div>
        </div>

        <!-- Main Terminal Full Screen -->
        <div id="terminal-screen" class="terminal-content custom-scrollbar">
            <div id="output" class="output"></div>

            <!-- Inline Input Area -->
            <div class="promptline">
                <span id="prompt" class="prompt"></span>
                <span id="input" class="input"></span><span id="input-hint" class="input-hint"></span>
                <span class="cursor">█</span>
            </div>
            <div id="suggestions" class="suggestions"></div>

            <div id="terminalEndRef"></div>
        </div>

        <!-- Status Footer -->
        <div class="status-bar">
            <div class="status-left">
                <button id="footer-power-btn" class="footer-btn" aria-label="Power Button">⏻</button>
            </div>
            <div class="status-center">
                <span id="status-date"></span> — <span id="status-year"></span>
            </div>
            <div class="status-right">
                <span id="status-weather">Detecting location...</span>
            </div>
        </div>
    </div>

    <!-- Power Screen Overlay -->
    <div id="power-screen" class="power-screen hidden">
        <div class="power-content">
            <div class="power-text">
                <span class="suspended-label">[ SYSTEM SUSPENDED ]</span><br><br>
                Awaiting user reactivation...<span class="cursor">_</span>
            </div>
            <button id="power-btn" class="power-btn" aria-label="Power On">
                <svg viewBox="0 0 24 24" class="power-icon" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                    <line x1="12" y1="2" x2="12" y2="12"></line>
                </svg>
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/constants.js?v=3"></script>
    <script src="assets/js/app.js?v=3"></script>
</body>

</html>
